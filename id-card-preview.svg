<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1b2430" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="logoBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f66ad"/>
      <stop offset="1" stop-color="#173f83"/>
    </linearGradient>
    <style>
      .bg { fill: #eef2f6; }
      .card { fill: #ffffff; stroke: #d7dde7; stroke-width: 2; filter: url(#shadow); }
      .brand { font: 800 46px Arial, Helvetica, sans-serif; font-style: italic; fill: url(#logoBlue); }
      .brand-small { font: 700 18px Arial, Helvetica, sans-serif; fill: #4f667e; letter-spacing: .4px; }
      .blue-panel { fill: #1f4f95; }
      .gold { fill: #f0c51b; }
      .muted { fill: #77879b; }
      .text { font-family: Arial, Helvetica, sans-serif; fill: #233044; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #d7e0ec; }
      .name { font: 800 20px Arial, Helvetica, sans-serif; fill: #f0c51b; }
      .role { font: 700 21px Arial, Helvetica, sans-serif; fill: #d7e0ec; }
      .back-title { font: 800 14px Arial, Helvetica, sans-serif; fill: #202833; }
      .back-line { font: 700 13px Arial, Helvetica, sans-serif; fill: #252e3b; }
      .bullet { font: 500 14px Arial, Helvetica, sans-serif; fill: #252e3b; }
      .photo-text { font: 800 23px Arial, Helvetica, sans-serif; fill: #8ca3be; letter-spacing: 2px; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <text x="600" y="66" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#27364a">ID Card Preview</text>

  <!-- Front -->
  <g transform="translate(205 110)">
    <rect class="card" width="330" height="520" rx="24"/>
    <image href="jixels-logo-form-ni-tenje-cropped.jpeg" x="25" y="31" width="280" height="145" preserveAspectRatio="xMidYMid meet"/>

    <path class="blue-panel" d="M165 176
      C238 176 284 232 284 306
      L284 410
      C284 466 238 495 165 495
      C92 495 46 466 46 410
      L46 306
      C46 232 92 176 165 176Z"/>

    <circle cx="165" cy="264" r="86" fill="#f8fbff" stroke="#f0c51b" stroke-width="5"/>
    <circle cx="165" cy="264" r="72" fill="#eef3f8" stroke="#dbe4ef" stroke-width="2"/>
    <text class="photo-text" x="165" y="272" text-anchor="middle">PHOTO</text>

    <text class="label" x="165" y="383" text-anchor="middle">ID No. 29352273</text>
    <text class="name" x="165" y="421" text-anchor="middle">James O. Atsali</text>
    <text class="role" x="165" y="457" text-anchor="middle">Director</text>
  </g>

  <!-- Back -->
  <g transform="translate(665 110)">
    <rect class="card" width="330" height="520" rx="24"/>
    <text class="back-line" x="76" y="54">If found please return to:</text>
    <text class="back-line" x="76" y="78">Jixels Technologies Ltd</text>
    <text class="back-line" x="76" y="102">P.O BOX 480-50101 Butere.</text>
    <text class="back-line" x="76" y="126">Phone:+254 713 111 666</text>

    <text class="back-title" x="35" y="176">Cardholder Responsibilities:</text>
    <text class="bullet" x="45" y="216">•</text>
    <text class="bullet" x="76" y="216">This ID card is the</text>
    <text class="bullet" x="76" y="236">property of Jixels</text>
    <text class="bullet" x="76" y="256">Technologies Ltd.</text>

    <text class="bullet" x="45" y="288">•</text>
    <text class="bullet" x="76" y="288">Use of this card is</text>
    <text class="bullet" x="76" y="308">strictly for the person</text>
    <text class="bullet" x="76" y="328">to whom it is issued.</text>

    <text class="bullet" x="45" y="360">•</text>
    <text class="bullet" x="76" y="360">Must be displayed at all</text>
    <text class="bullet" x="76" y="380">times while on company</text>
    <text class="bullet" x="76" y="400">premises.</text>

    <text class="bullet" x="45" y="420">•</text>
    <text class="bullet" x="76" y="420">Report lost/stolen cards</text>
    <text class="bullet" x="76" y="440">immediately to HR.</text>

    <image href="jixels-logo-form-ni-tenje-cropped.jpeg" x="125" y="472" width="80" height="41" preserveAspectRatio="xMidYMid meet"/>
  </g>
</svg>
